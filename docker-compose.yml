# docker-compose.yml (Development Environment)
services:
  postgres_walmart:
    image: postgres:17
    container_name: postgres_walmart
    environment:
      # Using variable expansion with default values for easier setup
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Bind mounts for database initialization and development
      - ./init_db:/docker-entrypoint-initdb.d
      # Named volume for persistent data storage
      - postgres_walmart_volume:/var/lib/postgresql/data
    restart: no
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_walmart_volume:
    name: postgres_walmart_volume
